mixed-port: ${LOCAL_PROXY_PORT}
allow-lan: false
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:${MIHOMO_API_PORT}
secret: ""

tun:
  enable: false

dns:
  enable: true
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://1.1.1.1/dns-query#ai-relay
    - https://8.8.8.8/dns-query#ai-relay
  fallback-filter:
    geoip: true
    geoip-code: CN
  nameserver-policy:
${CORPORATE_DNS_POLICY}

proxies:
  - name: ai-relay
    type: hysteria2
    server: ${AI_RELAY_HOST}
    port: ${AI_RELAY_PORT}
    password: ${HY2_PASSWORD}
    sni: ${HY2_SNI}
    skip-cert-verify: ${HY2_SKIP_CERT_VERIFY}
    up: "${HY2_UP}"
    down: "${HY2_DOWN}"

proxy-groups:
  - name: MODE
    type: select
    proxies:
      - Global
      - AI Only
      - Bypass

  - name: Global
    type: select
    proxies: [ai-relay]

  - name: AI Only
    type: select
    proxies: [DIRECT]

  - name: Bypass
    type: select
    proxies: [DIRECT]

  - name: ai-route
    type: select
    proxies: [ai-relay, DIRECT]

rules:
${AI_RULES}

  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve

${CORPORATE_RULES}
${DIRECT_DOMAIN_RULES}
  - GEOIP,CN,DIRECT
  - MATCH,MODE
